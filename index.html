<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --arc: #00d4ff;
      --arc-dim: #0088aa;
      --arc-glow: rgba(0,212,255,0.35);
      --arc-faint: rgba(0,212,255,0.08);
      --iron: #1a2a3a;
      --iron-dark: #0a1520;
      --iron-mid: #0f1e2e;
      --text: #c8f0ff;
      --text-dim: #5a8aaa;
      --red: #ff4455;
      --gold: #ffcc44;
      --green: #44ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--iron-dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,5,15,0.85) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 60px; height: 60px;
      pointer-events: none;
      z-index: 1;
    }
    .corner.tl { top: 0; left: 0; border-top: 2px solid var(--arc); border-left: 2px solid var(--arc); }
    .corner.tr { top: 0; right: 0; border-top: 2px solid var(--arc); border-right: 2px solid var(--arc); }
    .corner.bl { bottom: 0; left: 0; border-bottom: 2px solid var(--arc); border-left: 2px solid var(--arc); }
    .corner.br { bottom: 0; right: 0; border-bottom: 2px solid var(--arc); border-right: 2px solid var(--arc); }

    .arc-reactor {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(0,212,255,0.2);
      background: linear-gradient(180deg, rgba(0,30,50,0.9) 0%, transparent 100%);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 0.3em;
      color: var(--arc);
      text-shadow: 0 0 20px var(--arc-glow), 0 0 40px var(--arc-glow);
    }

    .logo::after {
      content: 'JUST A RATHER VERY INTELLIGENT SYSTEM';
      display: block;
      font-size: 0.3rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      margin-top: 2px;
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.7rem;
      font-family: 'Orbitron', monospace;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--arc);
      box-shadow: 0 0 8px var(--arc);
      animation: pulse 2s infinite;
    }

    .hdr-btn {
      background: transparent;
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--text-dim);
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .hdr-btn:hover { border-color: var(--arc); color: var(--arc); box-shadow: 0 0 8px var(--arc-glow); }
    #ngrokToggle { color: var(--gold); border-color: rgba(255,204,68,0.4); }
    #ngrokToggle:hover { border-color: var(--gold); box-shadow: 0 0 8px rgba(255,204,68,0.3); color: var(--gold); }

    /* ── NGROK PANEL (colapsable, solo para acceso remoto) ── */
    #ngrok-panel {
      position: relative;
      z-index: 10;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
      background: rgba(5,18,30,0.97);
      border-bottom: 1px solid rgba(255,204,68,0.15);
    }
    #ngrok-panel.open { max-height: 120px; }

    .ngrok-inner {
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
    }

    .ngrok-inner label { color: var(--gold); white-space: nowrap; }

    .ngrok-inner p {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #ngrokInput {
      flex: 1;
      background: rgba(0,30,50,0.7);
      border: 1px solid rgba(255,204,68,0.2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      padding: 5px 10px;
      outline: none;
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }
    #ngrokInput:focus { border-color: var(--gold); }
    #ngrokInput::placeholder { color: var(--text-dim); }

    #ngrokSave {
      background: transparent;
      border: 1px solid rgba(255,204,68,0.4);
      color: var(--gold);
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #ngrokSave:hover { box-shadow: 0 0 8px rgba(255,204,68,0.3); }

    /* ── STATUS BAR ── */
    #status-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 24px;
      background: rgba(0,212,255,0.03);
      border-bottom: 1px solid rgba(0,212,255,0.1);
      font-family: 'Orbitron', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .status-item { display: flex; align-items: center; gap: 6px; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .sdot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .sdot.yellow { background: var(--gold);  box-shadow: 0 0 6px rgba(255,204,68,0.6); }
    .sdot.red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .sdot.dim    { background: var(--text-dim); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      min-height: 0;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--arc-dim); border-radius: 2px; }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
      animation: fadeSlide 0.3s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user {
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      border-right: 3px solid var(--arc);
      align-self: flex-end;
      color: var(--text);
    }
    .user::before {
      content: 'STARK';
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      color: var(--arc);
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }

    .jarvis {
      background: rgba(10,25,40,0.8);
      border: 1px solid rgba(0,212,255,0.15);
      border-left: 3px solid var(--arc);
      align-self: flex-start;
      color: var(--text);
    }
    .jarvis::before {
      content: 'JARVIS';
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      color: var(--arc);
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }

    .msg-action { border-left-color: var(--green); }
    .msg-action::after {
      content: '⚡ ACCIÓN EJECUTADA';
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      color: var(--green);
      letter-spacing: 0.15em;
      margin-top: 8px;
      opacity: 0.7;
    }

    .typing { display: flex; gap: 5px; align-items: center; padding: 16px; }
    .typing span { width: 6px; height: 6px; background: var(--arc); border-radius: 50%; animation: typingBounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      background: linear-gradient(0deg, rgba(0,10,20,0.95) 0%, transparent 100%);
      border-top: 1px solid rgba(0,212,255,0.15);
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-wrapper { flex: 1; position: relative; }
    .input-wrapper::before {
      content: '›';
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--arc);
      font-size: 1.2rem;
      pointer-events: none;
    }

    #textInput {
      width: 100%;
      padding: 13px 16px 13px 30px;
      background: rgba(0,30,50,0.7);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    #textInput:focus { border-color: var(--arc); box-shadow: 0 0 15px var(--arc-glow), inset 0 0 10px rgba(0,212,255,0.05); }
    #textInput::placeholder { color: var(--text-dim); }
    #textInput:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn {
      width: 46px; height: 46px;
      background: transparent;
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--arc);
      border-radius: 2px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--arc); box-shadow: 0 0 12px var(--arc-glow); }
    .btn:active { transform: scale(0.96); }
    .btn.recording { border-color: var(--red); color: var(--red); animation: recPulse 1s infinite; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #liveBtn {
      width: auto; padding: 0 14px;
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem; letter-spacing: 0.15em;
      color: var(--text-dim); border-color: rgba(0,212,255,0.15);
    }
    #liveBtn.live-on { color: var(--red); border-color: var(--red); animation: recPulse 1.5s infinite; }

    @keyframes recPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255,68,85,0.3); }
      50% { box-shadow: 0 0 20px rgba(255,68,85,0.7); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--arc); }
      50% { opacity: 0.5; box-shadow: 0 0 2px var(--arc); }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="arc-reactor">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="80" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="#00d4ff" stroke-width="1"/>
      <circle cx="100" cy="100" r="40" fill="none" stroke="#00d4ff" stroke-width="1"/>
      <circle cx="100" cy="100" r="18" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="100" cy="100" r="8"  fill="#00d4ff"/>
      <line x1="100" y1="5"   x2="100" y2="82"  stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="100" y1="118" x2="100" y2="195" stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="5"   y1="100" x2="82"  y2="100" stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="118" y1="100" x2="195" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="33"  y1="33"  x2="86"  y2="86"  stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="114" y1="114" x2="167" y2="167" stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="167" y1="33"  x2="114" y2="86"  stroke="#00d4ff" stroke-width="0.5"/>
      <line x1="86"  y1="114" x2="33"  y2="167" stroke="#00d4ff" stroke-width="0.5"/>
    </svg>
  </div>

  <header>
    <div class="logo">JARVIS</div>
    <div class="header-right">
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>SISTEMA EN LÍNEA</span>
      </div>
      <button class="hdr-btn" id="ngrokToggle">🌐 ACCESO REMOTO</button>
      <button class="hdr-btn" id="clearBtn">LIMPIAR SESIÓN</button>
    </div>
  </header>

  <!-- Panel ngrok: solo para acceso desde celular/otro dispositivo -->
  <div id="ngrok-panel">
    <div class="ngrok-inner">
      <label>NGROK (acceso remoto) →</label>
      <input id="ngrokInput" placeholder="https://xxxx-xx-xx-xx-xx.ngrok-free.app" autocomplete="off" spellcheck="false">
      <button id="ngrokSave">CONECTAR</button>
      <p style="color:var(--text-dim); font-size:0.65rem;">Solo necesario desde celular u otra PC</p>
    </div>
  </div>

  <!-- Barra de estado de conexiones -->
  <div id="status-bar">
    <div class="status-item">
      <div class="sdot" id="localDot"></div>
      <span id="localLabel">LOCAL: —</span>
    </div>
    <div class="status-item">
      <div class="sdot dim" id="ngrokDot"></div>
      <span id="ngrokLabel">NGROK: —</span>
    </div>
    <div class="status-item" style="margin-left:auto;">
      <div class="sdot green"></div>
      <span id="modeLabel">MODO: —</span>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <input id="textInput" placeholder="Iniciando sistemas..." autocomplete="off" disabled>
      </div>
      <button class="btn" id="micBtn" title="Micrófono" disabled>🎤</button>
      <button class="btn" id="liveBtn" disabled>LIVE</button>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // JARVIS — frontend unificado para uso local y remoto
    //
    // Lógica de conexión (en orden de prioridad):
    //   1. Si estamos en localhost/127.0.0.1 → conectar directo a localhost:8000
    //   2. Si hay una URL de ngrok guardada → usar esa
    //   3. Si ninguna funciona → mostrar error claro
    //
    // NO hay fallback a /api/chat (endpoint de Vercel que no existe en local).
    // ─────────────────────────────────────────────────────────────────────────

    const NGROK_HEADERS    = { 'ngrok-skip-browser-warning': '1' };
    const LOCAL_BACKEND    = 'http://127.0.0.1:8000';
    const PING_TIMEOUT_MS  = 3000;

    const chat        = document.getElementById('chat');
    const textInput   = document.getElementById('textInput');
    const micBtn      = document.getElementById('micBtn');
    const liveBtn     = document.getElementById('liveBtn');
    const clearBtn    = document.getElementById('clearBtn');
    const ngrokInput  = document.getElementById('ngrokInput');
    const ngrokSave   = document.getElementById('ngrokSave');
    const ngrokPanel  = document.getElementById('ngrok-panel');
    const ngrokToggle = document.getElementById('ngrokToggle');
    const localDot    = document.getElementById('localDot');
    const localLabel  = document.getElementById('localLabel');
    const ngrokDot    = document.getElementById('ngrokDot');
    const ngrokLabel  = document.getElementById('ngrokLabel');
    const modeLabel   = document.getElementById('modeLabel');

    let BACKEND_URL   = '';   // URL activa que se usa para /command
    let recognition;
    let isLive        = false;

    // ── Cargar ngrok guardado ─────────────────────────────────────────────────
    const savedNgrok = localStorage.getItem('jarvis_ngrok') || '';
    if (savedNgrok) ngrokInput.value = savedNgrok;

    // ── Ngrok panel toggle ────────────────────────────────────────────────────
    ngrokToggle.onclick = () => {
      const open = ngrokPanel.classList.toggle('open');
      ngrokToggle.textContent = open ? '✕ CERRAR' : '🌐 ACCESO REMOTO';
    };

    // ── Helpers de UI ─────────────────────────────────────────────────────────
    function setDot(dotEl, labelEl, state, text) {
      dotEl.className = 'sdot ' + state;
      labelEl.textContent = text;
    }

    function enable() {
      textInput.disabled = false;
      micBtn.disabled    = false;
      liveBtn.disabled   = false;
      textInput.placeholder = 'Ingresá un comando o pregunta...';
    }

    function addMessage(text, who, isAction = false) {
      const div = document.createElement('div');
      div.className = `message ${who}${isAction ? ' msg-action' : ''}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message jarvis typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    // ── Ping con timeout ──────────────────────────────────────────────────────
    async function pingURL(url, extraHeaders = {}) {
      try {
        const res = await fetch(`${url}/ping`, {
          signal: AbortSignal.timeout(PING_TIMEOUT_MS),
          headers: extraHeaders
        });
        return res.ok;
      } catch {
        return false;
      }
    }

    // ── Inicialización: detectar backend disponible ───────────────────────────
    async function init() {
      addMessage('Iniciando sistemas...', 'jarvis');

      const isLocalhost = ['localhost', '127.0.0.1'].includes(location.hostname);

      // 1. Intentar localhost:8000
      const localOk = await pingURL(LOCAL_BACKEND);

      if (localOk) {
        BACKEND_URL = LOCAL_BACKEND;
        setDot(localDot, localLabel, 'green', 'LOCAL: CONECTADO');
        modeLabel.textContent = 'MODO: LOCAL';
        enable();
        addMessage('Backend local detectado en puerto 8000. Control de PC habilitado.', 'jarvis');
        return;
      } else {
        setDot(localDot, localLabel, 'red', 'LOCAL: OFFLINE');
      }

      // 2. Intentar ngrok guardado
      const savedURL = localStorage.getItem('jarvis_ngrok') || '';
      if (savedURL) {
        const ngrokOk = await pingURL(savedURL, NGROK_HEADERS);
        if (ngrokOk) {
          BACKEND_URL = savedURL;
          setDot(ngrokDot, ngrokLabel, 'green', 'NGROK: CONECTADO');
          modeLabel.textContent = 'MODO: NGROK';
          enable();
          addMessage('Conectado vía ngrok. Control de PC habilitado.', 'jarvis');
          return;
        } else {
          setDot(ngrokDot, ngrokLabel, 'red', 'NGROK: OFFLINE');
        }
      } else {
        setDot(ngrokDot, ngrokLabel, 'dim', 'NGROK: —');
      }

      // 3. Sin backend local — modo cloud via Vercel
      modeLabel.textContent = 'MODO: CLOUD';
      setDot(localDot, localLabel, 'red', 'LOCAL: OFFLINE');
      enable();
      addMessage(
        'Backend local no detectado — modo cloud activo. Podés chatear normalmente.\n' +
        'Para habilitar control de PC: corré jarvis.bat y recargá la página.',
        'jarvis'
      );
    }

    // ── Conectar ngrok manualmente ────────────────────────────────────────────
    ngrokSave.onclick = async () => {
      let url = ngrokInput.value.trim().replace(/\/$/, '').split(' ')[0];
      if (!url) return;

      ngrokSave.textContent = '...';
      const ok = await pingURL(url, NGROK_HEADERS);
      ngrokSave.textContent = 'CONECTAR';

      if (ok) {
        BACKEND_URL = url;
        localStorage.setItem('jarvis_ngrok', url);
        setDot(ngrokDot, ngrokLabel, 'green', 'NGROK: CONECTADO');
        modeLabel.textContent = 'MODO: NGROK';
        enable();
        ngrokPanel.classList.remove('open');
        ngrokToggle.textContent = '🌐 ACCESO REMOTO';
        addMessage('✅ Conectado vía ngrok. Control de PC habilitado.', 'jarvis');
      } else {
        addMessage(`⚠️ No se pudo alcanzar ${url}. ¿Está ngrok corriendo?`, 'jarvis');
      }
    };

    // ── Enviar comando ────────────────────────────────────────────────────────
    async function sendToJarvis(text) {
      if (!text.trim()) return;

      addMessage(text, 'user');
      showTyping();

      // Si hay backend local/ngrok, usarlo (tiene acciones de PC)
      if (BACKEND_URL) {
        const headers = {
          'Content-Type': 'application/json',
          ...(BACKEND_URL !== LOCAL_BACKEND ? NGROK_HEADERS : {})
        };
        try {
          const res  = await fetch(`${BACKEND_URL}/command`, {
            method: 'POST',
            headers,
            body: JSON.stringify({ text }),
            signal: AbortSignal.timeout(20000)
          });
          const data = await res.json();
          removeTyping();
          addMessage(data.response, 'jarvis', data.action_executed || false);
          return;
        } catch {
          // Backend cayó — marcar offline y caer a Vercel
          setDot(BACKEND_URL === LOCAL_BACKEND ? localDot : ngrokDot,
                 BACKEND_URL === LOCAL_BACKEND ? localLabel : ngrokLabel,
                 'red', BACKEND_URL === LOCAL_BACKEND ? 'LOCAL: OFFLINE' : 'NGROK: OFFLINE');
          BACKEND_URL = '';
          modeLabel.textContent = 'MODO: CLOUD';
        }
      }

      // Fallback: Vercel cloud via /api/gemini
      try {
        const contents = [{ role: 'user', parts: [{ text }] }];
        const res  = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents }),
          signal: AbortSignal.timeout(20000)
        });
        const data = await res.json();
        removeTyping();
        if (data.success && data.text) {
          addMessage(data.text, 'jarvis');
        } else {
          addMessage(data.error || 'Error al conectar con la IA.', 'jarvis');
        }
      } catch {
        removeTyping();
        addMessage('Sin conexión con el servidor. Verificá tu internet.', 'jarvis');
      }
    }

    // ── Mic ──────────────────────────────────────────────────────────────────
    micBtn.onclick = () => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert("Tu navegador no soporta reconocimiento de voz"); return; }
      micBtn.classList.add('recording');
      const r = new SR();
      r.lang = 'es-ES'; r.interimResults = false; r.maxAlternatives = 1;
      r.onresult = e => { sendToJarvis(e.results[0][0].transcript); micBtn.classList.remove('recording'); };
      r.onerror  = () => micBtn.classList.remove('recording');
      r.onend    = () => micBtn.classList.remove('recording');
      r.start();
    };

    // ── Live ─────────────────────────────────────────────────────────────────
    liveBtn.onclick = () => {
      isLive = !isLive;
      liveBtn.textContent = isLive ? '● LIVE' : 'LIVE';
      liveBtn.classList.toggle('live-on', isLive);
      if (isLive) startLive();
      else if (recognition) recognition.stop();
    };

    function startLive() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;
      recognition = new SR();
      recognition.lang = 'es-ES'; recognition.continuous = true; recognition.interimResults = true;
      recognition.onresult = e => {
        const last = e.results[e.results.length - 1];
        if (last.isFinal) sendToJarvis(last[0].transcript);
      };
      recognition.onerror = () => { if (isLive) startLive(); };
      recognition.onend   = () => { if (isLive) startLive(); };
      recognition.start();
    }

    // ── Limpiar sesión ────────────────────────────────────────────────────────
    clearBtn.onclick = async () => {
      if (BACKEND_URL) {
        const h = BACKEND_URL !== LOCAL_BACKEND ? NGROK_HEADERS : {};
        await fetch(`${BACKEND_URL}/conversation`, { method: 'DELETE', headers: h }).catch(() => {});
      } else {
        // /api/gemini es stateless, no hay historial que limpiar en cloud
      }
      chat.innerHTML = '';
      addMessage('Sesión reiniciada. ¿En qué te puedo ayudar?', 'jarvis');
    };

    // ── Enter ─────────────────────────────────────────────────────────────────
    textInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && !textInput.disabled) {
        const v = textInput.value.trim();
        if (v) { sendToJarvis(v); textInput.value = ''; }
      }
    });

    // ── Arrancar ──────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
